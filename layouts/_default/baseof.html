<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />

    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-9QTE7Q732F"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-9QTE7Q732F');
    </script>

    <link rel="icon" type="image/png" href="/favicon.png" />

    <!-- Twitter summary card -->
    <meta
      property="og:title"
      content="{{ block "ogtitle" . }}{{ if and (not .IsHome) .Title }}{{ .Title }} - {{ end }}みちのぶのねぐら{{ end }}"
    />
    <meta property="og:site_name" content="みちのぶのねぐら" />
    <meta property="og:description" content="" />
    <meta
      property="og:image"
      content="https://pages.michinobu.jp/img/dragon2013.jpg"
    />
    <meta
      name="twitter:title"
      content="{{ block "twtitle" . }}{{ if and (not .IsHome) .Title }}{{ .Title }} - {{ end }}みちのぶのねぐら{{ end }}"
    />
    <meta name="twitter:description" content="" />
    <meta name="twitter:creator" content="@mixnb" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta
      name="twitter:image"
      content="https://pages.michinobu.jp/img/dragon2013.png"
    />

    <link href="/css/main.css" rel="stylesheet" />

    <!-- MathJax: https://www.mathjax.org/ -->
    <script>
      MathJax = {
        tex: {
          inlineMath: [
            ["$", "$"],
            ["\\(", "\\)"],
          ],
        },
        svg: {
          fontCache: "global",
        },
      };
    </script>
    <script
      id="MathJax-script"
      async
      src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"
    ></script>

    <!-- highlight.js -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/styles/default.min.css"
    />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/highlight.min.js"></script>
    <script>
      hljs.highlightAll();
    </script>

    <title>{{ block "title" . }}{{ if and (not .IsHome) .Title }}{{ .Title }} - {{ end }}みちのぶのねぐら{{ end }}</title>

  </head>

  <body>
    <!-- Mermaid: https://mermaid.js.org/ -->
    <script type="module">
      import mermaid from "https://cdn.jsdelivr.net/npm/mermaid@11.8.1/+esm";
      mermaid.initialize({ startOnLoad: false, theme: "default" });
      await mermaid.run({ querySelector: "code.language-mermaid" });
    </script>

    <div id="main">
      <header>
        <a href="/"
          ><img
            class="site-image"
            src="/img/logo.png"
            alt="dragon image"
          />
          みちのぶのねぐら</a
        >
        <nav>
          <ul class="categories">
            {{ range site.Menus.main }}
            <li><a href="{{ .URL }}">{{ .Name }}</a></li>
            {{ end }}
          </ul>
        </nav>
      </header>

      <div id="content">
        {{ block "main" . }}{{ end }}
      </div>
    </div>

    {{ partial "sidebar.html" . }}

  </body>
</html>
